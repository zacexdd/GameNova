<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Available</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f0f;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }
    .box {
        padding: 30px;
        border: 1px solid #333;
        border-radius: 12px;
        background: #1a1a1a;
        max-width: 300px;
    }
    h1 {
        font-size: 22px;
        margin-bottom: 10px;
    }
    p {
        font-size: 14px;
        color: #aaa;
    }
</style>
</head>
<body>
    <div class="box">
        <h1>PC Version Not Available</h1>
        <p>This content is currently available only on mobile devices.</p>
    </div>
</body>
</html>
